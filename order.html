<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salakni - إتمام الطلب</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-8">

<div class="w-full max-w-md bg-white shadow-xl rounded-xl p-6">
  <h1 class="text-2xl font-bold mb-4 text-center">معلومات التوصيل</h1>

  <div class="mb-6 bg-gray-50 p-4 rounded-lg border border-dashed">
    <h3 class="font-bold text-gray-700 mb-2 text-center">ملخص الطلب</h3>
    <ul id="order-items" class="space-y-1 text-sm text-gray-600"></ul>
    <div class="mt-4 pt-2 border-t flex justify-between font-bold text-lg text-primary">
      <span>المجموع</span><span id="order-total">0</span> دج
    </div>
  </div>

  <form id="order-form" class="space-y-4">
    <div>
      <label class="block mb-1 font-medium">الاسم الكامل</label>
      <input type="text" id="name" placeholder="محمد بن عبد الله" class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block mb-1 font-medium">العنوان</label>
      <input type="text" id="address" placeholder="العنوان..." class="w-full border rounded px-3 py-2">
    </div>
    <div>
      <label class="block mb-1 font-medium">رقم الهاتف</label>
      <input type="text" id="phone" placeholder="0550..." class="w-full border rounded px-3 py-2">
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mt-4 hover:bg-blue-700 transition">
      إرسال الطلب
    </button>
  </form>
</div>

<script>
const orderItemsEl = document.getElementById('order-items');
const orderTotalEl = document.getElementById('order-total');
const cart = JSON.parse(localStorage.getItem('cart') || '[]');

function renderOrder() {
  if(cart.length === 0) {
    alert("السلة فارغة، سيتم العودة لقائمة الطعام.");
    window.location.href = 'menu.html';
    return;
  }

  orderItemsEl.innerHTML = '';
  cart.forEach(item => {
    const li = document.createElement('li');
    li.className = "flex justify-between";
    li.innerHTML = `<span>${item.item}</span><span>${item.price} دج</span>`;
    orderItemsEl.appendChild(li);
  });

  orderTotalEl.textContent = cart.reduce((a,b)=>a+b.price,0);
}

renderOrder();

document.getElementById('order-form').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const address = document.getElementById('address').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if(!name || !address || !phone) {
    alert("الرجاء ملء جميع الحقول");
    return;
  }

  // تبسيط التحقق من رقم الهاتف ليقبل أي رقم مكوّن من 9-10 أرقام
  if(!/^\d{9,10}$/.test(phone)) {
    alert("الرجاء إدخال رقم هاتف صحيح");
    return;
  }

  const message = `*طلب جديد* 🛒%0A👤 ${name}%0A📍 ${address}%0A📱 ${phone}%0A${cart.map(i=>`- ${i.item} (${i.price} دج)`).join('%0A')}%0A💰 المجموع: ${cart.reduce((a,b)=>a+b.price,0)} دج`;
  window.open(`https://wa.me/213777117663?text=${message}`, '_blank');
  localStorage.removeItem('cart');
  window.location.href = 'menu.html';
});
</script>

</body>
</html>
