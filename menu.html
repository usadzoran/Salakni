<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salakni - قائمة الطعام</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <div class="container mx-auto py-8">
    <button onclick="window.location.href='restaurants.html'" class="mb-4 px-4 py-2 bg-primary text-white rounded">⬅ العودة للمطاعم</button>
    <h1 class="text-3xl font-bold mb-6">قائمة الطعام</h1>

    <div id="menu-items" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-4 z-20">
    <div class="container mx-auto flex justify-between items-center">
      <div>
        <p class="text-sm text-muted-foreground">المجموع (<span id="count">0</span> عناصر)</p>
        <p class="text-2xl font-bold text-primary"><span id="total">0</span> دج</p>
      </div>
      <button onclick="goToOrder()" class="bg-primary text-white px-6 py-3 rounded-lg font-bold">إتمام الطلب</button>
    </div>
  </div>

  <script>
    // مثال قائمة الطعام
    const menu = [
      { item: "بيتزا مارغريتا", price: 1200 },
      { item: "بيتزا ببروني", price: 1500 },
      { item: "سلطة خضراء", price: 500 },
      { item: "مقبلات مشكّلة", price: 700 },
      { item: "مكرونة بولونيز", price: 1100 },
    ];

    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    const menuEl = document.getElementById('menu-items');
    const totalEl = document.getElementById('total');
    const countEl = document.getElementById('count');

    function updateCart() {
      totalEl.textContent = cart.reduce((a,b) => a + b.price, 0);
      countEl.textContent = cart.length;
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function toggleItem(item) {
      const index = cart.findIndex(i => i.item === item.item);
      if(index > -1) {
        cart.splice(index,1); // إزالة إذا موجود
      } else {
        cart.push(item); // إضافة
      }
      renderMenu();
      updateCart();
    }

    function renderMenu() {
      menuEl.innerHTML = '';
      menu.forEach((item) => {
        const inCart = cart.some(i => i.item === item.item);
        const card = document.createElement('div');
        card.className = `p-4 flex justify-between items-center cursor-pointer border rounded-lg ${inCart ? 'bg-primary/10 border-primary' : 'bg-white'}`;
        card.innerHTML = `<span>${item.item}</span><span>${item.price} دج</span>`;
        card.onclick = () => toggleItem(item);
        menuEl.appendChild(card);
      });
    }

    function goToOrder() {
      if(cart.length === 0) {
        alert("الرجاء اختيار عنصر واحد على الأقل!");
        return;
      }
      window.location.href = 'order.html';
    }

    renderMenu();
    updateCart();
  </script>
</body>
</html>
