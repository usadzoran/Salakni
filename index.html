<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salakni</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
  body,html{height:100%;}
  .screen{display:none;height:100%;width:100%;transition:0.5s;}
  .active{display:flex;}
  #home{background:url('https://images.unsplash.com/photo-1601924638867-3e3ee3f4f85e?auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-shadow:1px 1px 5px #000;}
  #home h1{font-size:50px;margin-bottom:20px;}
  #home button{padding:15px 30px;font-size:20px;border:none;border-radius:10px;background:#ff4d4d;color:#fff;cursor:pointer;}
  #restaurants,#menu,#form{flex-direction:column;align-items:center;padding:50px 20px;background:#f7f7f7;}
  .restaurant-card{display:flex;flex-direction:column;align-items:center;margin-bottom:30px;cursor:pointer;transition:0.3s;}
  .restaurant-card img{width:300px;height:200px;object-fit:cover;border-radius:15px;}
  .restaurant-card h2{margin-top:10px;color:#333;}
  .menu-item{display:flex;justify-content:flex-start;align-items:center;width:300px;margin-bottom:15px;font-size:18px;}
  .menu-item input{margin-right:10px;}
  #buyBtn,#form button{margin-top:30px;padding:12px 25px;font-size:18px;border:none;border-radius:10px;background:#28a745;color:#fff;cursor:pointer;}
  #form input{margin-bottom:15px;padding:12px;width:300px;font-size:16px;border-radius:8px;border:1px solid #ccc;}
</style>
</head>
<body>

<div id="home" class="screen active">
  <h1>Salakni</h1>
  <button onclick="showRestaurants()">ابدأ</button>
</div>

<div id="restaurants" class="screen"></div>

<div id="menu" class="screen">
  <h2 id="restaurantName"></h2>
  <div id="menuItems"></div>
  <button id="buyBtn" onclick="showForm()">اشترِ الآن</button>
</div>

<div id="form" class="screen">
  <h2>أدخل معلوماتك</h2>
  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="text" id="address" placeholder="العنوان">
  <input type="text" id="phone" placeholder="رقم الهاتف">
  <button onclick="sendWhatsApp()">إرسال</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ----- إعداد Supabase -----
const supabaseUrl = 'https://yfbmmflrvelcctengksm.supabase.co'
const supabaseKey = 'sb_publishable_eScpCIuTYOsA7KUKlYzeHg_8cQqZQ7f'
const supabase = createClient(supabaseUrl, supabaseKey)

// ----- متغيرات الواجهة -----
let restaurants = []
let selectedRestaurant = null

// ----- عرض الشاشة -----
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// ----- عرض المطاعم -----
async function showRestaurants(){
  showScreen('restaurants')
  try{
    const { data, error } = await supabase.from('restaurants').select('*')
    if(error){ console.error(error); return; }
    restaurants = data
    const restDiv = document.getElementById('restaurants')
    restDiv.innerHTML = ''
    restaurants.forEach((r,i)=>{
      const card = document.createElement('div')
      card.className='restaurant-card'
      card.innerHTML=`<img src="${r.image}" alt="${r.name}"><h2>${r.name}</h2>`
      card.onclick = ()=>showMenu(i)
      restDiv.appendChild(card)
    })
  }catch(e){
    console.error(e)
  }
}

// ----- عرض قائمة المأكولات -----
function showMenu(index){
  selectedRestaurant = restaurants[index]
  document.getElementById('restaurantName').innerText = selectedRestaurant.name
  const menuDiv = document.getElementById('menuItems')
  menuDiv.innerHTML=''
  selectedRestaurant.menu.forEach(m=>{
    const div = document.createElement('div')
    div.className='menu-item'
    div.innerHTML=`<label><input type="checkbox" class="menu-checkbox" data-item="${m.item}" data-price="${m.price}">${m.item} - ${m.price} دج</label>`
    menuDiv.appendChild(div)
  })
  showScreen('menu')
}

// ----- عرض نموذج المعلومات -----
function showForm(){
  showScreen('form')
}

// ----- إرسال الطلب على WhatsApp -----
function sendWhatsApp(){
  const name=document.getElementById('name').value.trim()
  const address=document.getElementById('address').value.trim()
  const phone=document.getElementById('phone').value.trim()
  if(!name||!address||!phone){alert('المرجو تعبئة جميع الحقول');return;}
  const selectedItems = Array.from(document.querySelectorAll('.menu-checkbox'))
    .filter(chk=>chk.checked)
    .map(chk=>`${chk.dataset.item} - ${chk.dataset.price} دج`)
  if(selectedItems.length===0){alert('المرجو اختيار وجبة واحدة على الأقل');return;}
  const message=`طلب جديد من ${name}%0Aالعنوان: ${address}%0Aالهاتف: ${phone}%0Aمطعم: ${selectedRestaurant.name}%0Aقائمة الطلب:%0A${selectedItems.join('%0A')}`
  const whatsappNumber = "213777117663" // ضع رقم واتسابك هنا
  window.open(`https://wa.me/${whatsappNumber}?text=${message}`,'_blank')
}
</script>

</body>
</html>
