<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salakni</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* 1. الخلفية السوداء والنص الأبيض */
  body { margin:0; font-family:sans-serif; background:#1e1e1e; color: white; }
  .hidden { display:none; }
  .container { max-width:1200px; margin:0 auto; padding:20px; }
  
  /* 2. خلفية الهيدر والبطاقات الداكنة */
  header { background:#252525; padding:15px; box-shadow:0 2px 5px rgba(0,0,0,0.5); position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; }
  h1,h2,h3 { margin:0; }
  
  /* 3. لون الأزرار الأحمر */
  .button { background:#dc3545; color:white; padding:12px 24px; border:none; border-radius:12px; cursor:pointer; transition:0.3s; display:flex; align-items:center; }
  .button:hover { background:#c82333; transform:scale(1.05); }
  
  /* 4. تصميم البطاقات الداكنة */
  .card { background:#333; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.4); overflow:hidden; cursor:pointer; transition:0.3s; }
  .card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.6); transform:translateY(-5px); }
  .card img { width:100%; height:200px; object-fit:cover; }
  .grid { display:grid; gap:20px; }
  .grid-cols-3 { grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); }
  
  /* 5. تعديل حجم صور المأكولات (أكبر) */
  .menu-item-content { 
      display:flex; 
      flex-direction: column; /* لتكديس الصورة والنص عمودياً */
      align-items: center; 
      padding: 15px;
      border-radius: 8px; 
      transition: 0.3s;
      background: #444; /* خلفية الوجبة */
      text-align: center;
  }
  .menu-item-content img { 
      width: 100%; /* اجعل الصورة تأخذ عرض البطاقة */
      height: 180px; /* حجم صورة أكبر */
      object-fit: cover; 
      margin-bottom: 10px; 
      border-radius: 8px; 
  }
  .menu-item-content span {
      font-weight: bold;
      color: #ffc107; /* سعر بلون مختلف */
      margin-top: 5px;
  }
  .menu-item-content.selected { 
      background:#dc3545; /* لون أحمر عند الاختيار */
      color:white; 
  }
  
  input,textarea { width:100%; padding:10px; margin-top:5px; margin-bottom:10px; border:1px solid #555; border-radius:8px; background: #333; color: white;}
  .fixed-bottom { position:fixed; bottom:0; left:0; right:0; background:#252525; border-top:1px solid #444; padding:15px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 -2px 8px rgba(0,0,0,0.4); }
</style>
</head>
<body>

<div id="home" class="page">
  <div style="position:relative; height:100vh; color:white;">
    <img src="https://images.unsplash.com/photo-1601924638867-3e3ee3f4f85e?auto=format&fit=crop&w=1350&q=80" style="width:100%; height:100%; object-fit:cover;">
    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <h1 style="font-size:64px; margin-bottom:20px;">Salakni</h1>
      <p style="font-size:24px; max-width:500px; text-align:center;">أشهى المأكولات تصلك أينما كنت. اطلب الآن واستمتع بالطعم الأصيل.</p>
      <button class="button" onclick="showPage('restaurants')" style="margin-top:20px;">ابدأ الطلب</button>
    </div>
  </div>
</div>

<div id="restaurants" class="page hidden">
  <header>
    <h2>المطاعم</h2>
    <button class="button" onclick="showPage('home')">الرئيسية</button>
  </header>
  <div class="container grid grid-cols-3" id="restaurants-list">
    <h3>جاري تحميل المطاعم...</h3>
  </div>
</div>

<div id="menu" class="page hidden">
  <header>
    <button class="button" onclick="showPage('restaurants')">العودة للمطاعم</button>
    <h2 id="menu-title">قائمة الطعام</h2>
  </header>
  <div class="container grid grid-cols-3" id="menu-list">
    </div>
  <div class="fixed-bottom" id="cart-bar" style="display:none;">
    <div>
      <p id="cart-count">المجموع (0 عناصر)</p>
      <p id="cart-total">0 دج</p>
    </div>
    <button class="button" onclick="showPage('order')">إتمام الطلب</button>
  </div>
</div>

<div id="order" class="page hidden">
  <header>
    <button class="button" onclick="showPage('menu')">العودة للقائمة</button>
    <h2>معلومات التوصيل</h2>
  </header>
  <div class="container">
    <div id="order-summary" style="margin-bottom:20px;"></div>
    <input type="text" id="name" placeholder="الاسم الكامل">
    <textarea id="address" placeholder="العنوان"></textarea>
    <input type="text" id="phone" placeholder="رقم الهاتف">
    <button class="button" onclick="submitOrder()">إرسال الطلب</button>
  </div>
</div>

<script>
// ==========================================================
// 1. إعداد Supabase (بمفتاحك الصحيح)
// ==========================================================

const supabaseUrl = 'https://yfbmmflrvelcctengksm.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmYm1tZmxydmVsY2N0ZW5na3NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4Nzk4ODEsImV4cCI6MjA4MDQ1NTg4MX0.lSgg5aohNbpAAMWBP7_4sdbxwe7xICrD1xHmB7EXaic'; 
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// ==========================================================
// 2. المتغيرات والدوال المساعدة
// ==========================================================

let selectedRestaurant = null;
let cartItems = [];

function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');
  if(page==='restaurants') renderRestaurants(); 
  if(page==='menu') renderMenu();
  if(page==='order') renderOrderSummary();
}

async function renderRestaurants() {
  const container = document.getElementById('restaurants-list');
  container.innerHTML = '<h3>جاري تحميل المطاعم...</h3>'; 

  const { data: restaurants, error } = await supabaseClient
    .from('restaurants')
    .select('id, name, image_url, whatsapp, meals'); 

  if (error) {
    console.error("Error fetching restaurants:", error);
    container.innerHTML = `<h3 style="color:red;">حدث خطأ في جلب البيانات: ${error.message}</h3>`;
    return;
  }

  if (restaurants.length === 0) {
    container.innerHTML = '<h3>لا توجد مطاعم مسجلة حالياً.</h3>';
    return;
  }
  
  container.innerHTML = ''; 
  
  restaurants.forEach(r => {
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML=`<img src="${r.image_url}" alt="${r.name}"><h3 style="padding:10px;">${r.name}</h3>`;
    card.onclick=()=>{selectedRestaurant=r; cartItems=[]; showPage('menu');};
    container.appendChild(card);
  });
}

// ==========================================================
// 3. دالة عرض القائمة (تم التعديل لعرض الصور بالحجم الجديد)
// ==========================================================
function renderMenu() {
  const menuItems = selectedRestaurant.meals || []; 
  const container = document.getElementById('menu-list');
  container.innerHTML='';
  document.getElementById('menu-title').innerText=selectedRestaurant.name;
  
  menuItems.forEach((m,i)=>{
    const div = document.createElement('div');
    const isSelected = cartItems.includes(m);
    
    // تم حذف الكلاس القديم وإضافة محتوى item-content جديد
    div.className='menu-item-content'+(isSelected?' selected':''); 
    
    // هيكل العرض الجديد (صورة أكبر واسم وسعر)
    div.innerHTML=`
        <img src="${m.image_url}" alt="${m.name}">
        <p style="font-size:1.1em; margin: 0;">${m.name}</p>
        <span>${m.price} دج</span>
    `;
                   
    div.onclick=()=>{
      const index = cartItems.indexOf(m);
      if(index>-1) cartItems.splice(index,1);
      else cartItems.push(m);
      renderMenu(); updateCartBar();
    };
    container.appendChild(div);
  });
  updateCartBar();
}

function updateCartBar() {
  const bar = document.getElementById('cart-bar');
  if(cartItems.length>0){ 
    bar.style.display='flex';
    document.getElementById('cart-count').innerText=`المجموع (${cartItems.length} عناصر)`;
    const total = cartItems.reduce((a,b)=>a+b.price,0);
    document.getElementById('cart-total').innerText=total+' دج';
  } else bar.style.display='none';
}

function renderOrderSummary() {
  const summary = document.getElementById('order-summary');
  if(cartItems.length===0) summary.innerHTML='السلة فارغة';
  else summary.innerHTML='<h3>ملخص الطلب:</h3><ul>'+cartItems.map(i=>`<li>${i.name} (${i.price} دج)</li>`).join('')+'</ul>';
}

function submitOrder() {
  const name=document.getElementById('name').value.trim();
  const address=document.getElementById('address').value.trim();
  const phone=document.getElementById('phone').value.trim();
  if(!name||!address||!phone){ alert('الرجاء ملء جميع الحقول'); return; }

  const message = `*طلب جديد* 🛒%0A👤 ${name}%0A📍 ${address}%0A📱 ${phone}%0A🏠 ${selectedRestaurant.name}%0A${cartItems.map(i=>`- ${i.name} (${i.price} دج)`).join('%0A')}%0A💰 المجموع: ${cartItems.reduce((a,b)=>a+b.price,0)} دج`;
  window.open(`https://wa.me/${selectedRestaurant.whatsapp.replace(/\D/g,'')}?text=${message}`, '_blank');

  cartItems=[]; showPage('home');
}

showPage('home');
</script>

</body>
</html>
