<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salakni - المطاعم</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-primary font-sans">المطاعم</h1>
      <a href="index.html" class="text-sm text-muted-foreground hover:text-primary">الرئيسية</a>
    </div>
  </header>

  <main class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- مطعم 1 -->
      <a href="menu.html?restaurant=1">
        <div class="cursor-pointer overflow-hidden border-none shadow-md hover:shadow-xl h-full flex flex-col rounded-xl">
          <div class="relative h-48 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=800&q=80" alt="مطعم 1" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500">
            <div class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-md text-xs font-bold flex items-center">
              ⭐4.8
            </div>
          </div>
          <div class="p-4 flex-grow">
            <h2 class="text-xl font-bold mb-2 text-gray-800">مطعم البيتزا</h2>
            <p class="text-sm text-muted-foreground flex items-center gap-1">
              🕒 20-30 دقيقة توصيل
            </p>
          </div>
        </div>
      </a>

      <!-- مطعم 2 -->
      <a href="menu.html?restaurant=2">
        <div class="cursor-pointer overflow-hidden border-none shadow-md hover:shadow-xl h-full flex flex-col rounded-xl">
          <div class="relative h-48 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1600891964556-8e7b24e12d3f?auto=format&fit=crop&w=800&q=80" alt="مطعم 2" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500">
            <div class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-md text-xs font-bold flex items-center">
              ⭐4.7
            </div>
          </div>
          <div class="p-4 flex-grow">
            <h2 class="text-xl font-bold mb-2 text-gray-800">مطعم البرغر</h2>
            <p class="text-sm text-muted-foreground flex items-center gap-1">
              🕒 15-25 دقيقة توصيل
            </p>
          </div>
        </div>
      </a>

      <!-- يمكن إضافة مطاعم أكثر بنفس الطريقة -->
    </div>
  </main>

</body>
</html>
